opensource:
  title: 开源项目
  subtitle: 我们在开源社区构建 Agent 原生工具——面向 AI 时代的基础设施。
  view_github: 在 GitHub 查看
  projects:
    - tagline: Agent 原生知识运行时
      description: "LLM Agent 持续从各类数据源构建并维护活的知识库——以纯 Markdown 存储，始终保持最新、随时可查询。"
      tags: ["TypeScript", "MCP", "知识库"]

    - tagline: AI 原生后端即服务
      description: "基于 Go 构建、灵感来自 Appwrite 的 BaaS 平台——提供身份认证、动态文档数据库、文件存储、函数执行及内嵌管理控制台。"
      tags: ["Go", "gRPC", "PostgreSQL"]

    - tagline: Markdown 生成交互原型
      description: "编写 DESIGN.md 和页面规格 Markdown，确定性生成可运行的 SvelteKit 原型——快速设计评审，无需手写 UI 代码。"
      tags: ["TypeScript", "SvelteKit", "设计工具"]

about:
  title: AI 工程实验室
  blurb: DeepLoop AI Labs 是一家 AI 工程实验室，聚焦三大方向——开源 Agent 基础设施、面向企业的端到端 AI 项目开发，以及将团队培养成 Builder 的实战 AI 培训。
  btn_link: "/zh/about"
  btn_name: 了解更多
  work_process:
    - title: 探索
      icon: "ti-search"
      content: "梳理业务目标、数据现状与 AI 就绪度，制定清晰可执行的路线图。"
    - title: 构建
      icon: "ti-settings"
      content: "工程师团队设计并交付生产级 AI 系统——从 LLM Agent、RAG 管道到全栈 AI 应用。"
    - title: 赋能
      icon: "ti-light-bulb"
      content: "通过培训与文档传递知识，让团队能独立运维和扩展 AI 系统。"

