opensource:
  title: Open Source Projects
  subtitle: Agent-native tools we build in the open — production-ready infrastructure for the AI era.
  view_github: View on GitHub
  projects:
    - tagline: Agent-native knowledge runtime
      description: "LLM agents continuously build and maintain a living knowledge base from your sources — stored as plain Markdown, always current, always queryable."
      tags: ["TypeScript", "MCP", "Knowledge Base"]

    - tagline: AI-native Backend-as-a-Service
      description: "Appwrite-inspired BaaS built on Go — authentication, dynamic document database, file storage, function execution, and an embedded admin console."
      tags: ["Go", "gRPC", "PostgreSQL"]

    - tagline: Markdown to interactive prototypes
      description: "Write DESIGN.md and page specs in Markdown, generate runnable SvelteKit prototypes deterministically — fast design review without hand-coding UI."
      tags: ["TypeScript", "SvelteKit", "Design Tools"]

    - tagline: DAG event router for streaming data
      description: "Go-based event router processing streaming data through Source → Transform → Sink DAG topology — with conditional routing, backpressure, retry/DLQ, and at-least-once delivery."
      tags: ["Go", "DAG", "Streaming"]

about:
  title: AI Engineering Lab
  blurb: DeepLoop AI Labs is an AI engineering lab focused on three pillars — open-source agent infrastructure, end-to-end AI project development for enterprises, and hands-on AI training that turns teams into builders.
  btn_link: "/about"
  btn_name: Learn More About Us
  work_process:
    - title: Discover
      icon: "ti-search"
      content: "We map your business goals, data landscape, and AI readiness to define a clear, actionable roadmap."
    - title: Build
      icon: "ti-settings"
      content: "Our engineers design and ship production AI systems — from LLM agents and RAG pipelines to full-stack AI applications."
    - title: Enable
      icon: "ti-light-bulb"
      content: "We transfer knowledge through training and documentation so your team can operate and extend AI systems independently."

