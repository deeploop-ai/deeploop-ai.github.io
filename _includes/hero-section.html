<!-- hero area -->
<section class="hero-area" id="parallax">
  <div class="hero-grid"></div>
  <div class="container">
    <div class="row">
      <div class="col-lg-10 mx-auto text-center">
        <span class="hero-badge">{{ t.hero.badge }}</span>
        <h1 class="hero-title">{{ t.hero.title }}</h1>
        <p class="hero-subtitle">{{ t.hero.subtitle }}</p>
        <div class="hero-cta">
          <a href="{{ t.hero.cta_primary_link | relative_url }}" class="btn btn-primary btn-lg mr-3 mb-3">
            {{ t.hero.cta_primary }}
          </a>
          <a href="{{ t.hero.cta_secondary_link | relative_url }}" class="btn btn-outline-light btn-lg mb-3">
            {{ t.hero.cta_secondary }}
          </a>
        </div>
      </div>
    </div>
  </div>
  <ul class="hero-social list-unstyled">
    {% for social in s.social %}
    <li class="mb-3">
      <a href="{{ social.link }}" target="_blank" rel="noopener noreferrer" aria-label="{{ social.icon }}">
        <i class="{{ social.icon }}"></i>
      </a>
    </li>
    {% endfor %}
  </ul>
</section>
<!-- /hero area -->
