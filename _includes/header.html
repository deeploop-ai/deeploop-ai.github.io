<header class="navigation fixed-top">
  <nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" href="{{ home_url | relative_url }}">
      <img src="{{ site.logo }}" alt="{{ t.title }}" class="navbar-brand-logo" width="36" height="36">
      <span class="navbar-brand-text">{{ t.title }}</span>
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navigation"
      aria-controls="navigation" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navigation">
      <ul class="navbar-nav ml-auto align-items-lg-center">
        <li class="nav-item">
          <a class="nav-link" href="{{ home_url | relative_url }}">{{ t.nav.home }}</a>
        </li>
        {% for link in t.menu %}
          <li class="nav-item">
            <a class="nav-link" href="{{ link.link | relative_url }}">{{ t.nav[link.key] }}</a>
          </li>
        {% endfor %}
        <li class="nav-item nav-lang">
          {% include lang-switcher.html %}
        </li>
      </ul>
    </div>
  </nav>
</header>
