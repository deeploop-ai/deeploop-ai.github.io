<!-- contact -->
<section class="section section-contact" id="contact">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto text-center mb-5">
        <span class="section-label">{{ t.sections.contact }}</span>
        <h2 class="section-title">{{ t.contact.title }}</h2>
        {% if t.contact.message %}
        <p class="section-subtitle">{{ t.contact.message }}</p>
        {% endif %}
      </div>
    </div>
    <div class="row">
      <div class="col-lg-8 mx-auto">
        <div class="contact-card">
          <div class="row">
            <div class="col-md-5 contact-info">
              <h4>{{ t.contact.talk_title }}</h4>
              <p>{{ t.contact.talk_desc }}</p>
              <div class="contact-detail">
                <i class="ti-email"></i>
                <a href="mailto:{{ s.contact-email }}">{{ s.contact-email }}</a>
              </div>
              <div class="contact-detail">
                <i class="ti-github"></i>
                <a href="https://github.com/deeploop-ai" target="_blank" rel="noopener noreferrer">github.com/deeploop-ai</a>
              </div>
            </div>
            <div class="col-md-7 contact-cta">
              <h4>{{ t.contact.cta_title }}</h4>
              <p>{{ t.contact.cta_desc }}</p>
              <a href="mailto:{{ s.contact-email }}?subject={{ t.contact.email_subject | replace: ' ', '%20' }}" class="btn btn-primary btn-lg">
                <i class="ti-email"></i> {{ s.contact-email }}
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- /contact -->
