<!-- about -->
<section class="section section-about">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-6 mb-4 mb-lg-0">
        <span class="section-label">About</span>
        <h2 class="section-title text-left">AI Engineering Lab</h2>
        <p class="about-text">{{ site.data.settings.blurb }}</p>
        <a href="{{ site.data.settings.blurb-btn-link }}" class="btn btn-primary">{{ site.data.settings.blurb-btn-name }}</a>
      </div>
      {% if site.data.settings.work-process %}
      <div class="col-lg-6">
        <div class="process-grid">
          {% for process in site.data.settings.work-process %}
          <div class="process-card">
            <div class="process-card-icon">
              <i class="{{ process.icon }}"></i>
            </div>
            <h4>{{ process.title }}</h4>
            <p>{{ process.content }}</p>
          </div>
          {% endfor %}
        </div>
      </div>
      {% endif %}
    </div>
  </div>
</section>
<!-- /about -->
