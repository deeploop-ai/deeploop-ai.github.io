<!-- about -->
<section class="section section-about">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-6 mb-4 mb-lg-0">
        <span class="section-label">{{ t.sections.about }}</span>
        <h2 class="section-title text-left">{{ t.about.title }}</h2>
        <p class="about-text">{{ t.about.blurb }}</p>
        <a href="{{ t.about.btn_link | relative_url }}" class="btn btn-primary">{{ t.about.btn_name }}</a>
      </div>
      {% if t.about.work_process %}
      <div class="col-lg-6">
        <div class="process-grid">
          {% for process in t.about.work_process %}
          <div class="process-card">
            <div class="process-card-icon">
              <i class="{{ process.icon }}"></i>
            </div>
            <h4>{{ process.title }}</h4>
            <p>{{ process.content }}</p>
          </div>
          {% endfor %}
        </div>
      </div>
      {% endif %}
    </div>
  </div>
</section>
<!-- /about -->
